<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartProfit AI</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

h1{
text-align:center;
margin-bottom:5px;
}

.sub{
text-align:center;
opacity:0.7;
margin-bottom:20px;
}

.card{
background:rgba(255,255,255,0.06);
padding:15px;
border-radius:12px;
margin-top:15px;
backdrop-filter: blur(10px);
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
outline:none;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#4f46e5;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.result{
margin-top:10px;
line-height:1.6;
}

.ai{
margin-top:10px;
opacity:0.9;
}

canvas{
background:white;
border-radius:10px;
margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>SmartProfit AI</h1>
<p class="sub">Investor-grade business intelligence dashboard</p>

<!-- INPUTS -->
<div class="card">
<h3>📊 Ввод данных</h3>

<input id="revenue" type="number" placeholder="Выручка ($)">
<input id="costs" type="number" placeholder="Расходы ($)">

<button onclick="calc()">Рассчитать анализ</button>
</div>

<!-- RESULTS -->
<div class="card">
<h3>📈 Результаты</h3>
<div id="result">Введите данные и нажмите кнопку</div>
</div>

<!-- AI -->
<div class="card">
<h3>🧠 AI анализ</h3>
<div id="ai">Ожидание анализа...</div>
</div>

<!-- SCORE -->
<div class="card">
<h3>🚀 Startup Score</h3>
<div id="score">—</div>
</div>

<!-- CHART -->
<div class="card">
<h3>📊 Финансовый график</h3>
<canvas id="chart"></canvas>
</div>

</div>

<script>

let chart;

function calc(){

let r = Number(document.getElementById("revenue").value);
let c = Number(document.getElementById("costs").value);

let profit = r - c;
let margin = c > 0 ? (profit / c) * 100 : 0;

// SCORE (реальная логика, без фейков)
let score = 50;

if(profit > 0) score += 20;
if(margin > 20) score += 20;
if(profit > 1000) score += 10;

score = Math.min(100, score);

// RESULTS
document.getElementById("result").innerHTML =
"💰 Прибыль: $" + profit.toFixed(2) + "<br>" +
"📊 Маржа: " + margin.toFixed(2) + "%";

// AI
let ai = "";

if(score > 80){
ai = "🟢 Сильный бизнес. Инвестиционно привлекателен.";
}
else if(score > 50){
ai = "🟡 Стабильная модель, но есть риски.";
}
else{
ai = "🔴 Высокий риск. Требуется оптимизация.";
}

document.getElementById("ai").innerHTML = ai;

// SCORE UI
document.getElementById("score").innerHTML =
"🚀 Startup Score: " + score + "/100";

// GRAPH
drawChart(r, c, profit);

}

function drawChart(r, c, p){

let ctx = document.getElementById("chart").getContext("2d");

if(chart){
chart.destroy();
}

chart = new Chart(ctx, {
type: "bar",
data: {
labels: ["Revenue", "Costs", "Profit"],
datasets: [{
data: [r, c, p]
}]
},
options: {
responsive: true,
plugins: {
legend: { display: false }
}
}
});

}

</script>

</body>
</html>
