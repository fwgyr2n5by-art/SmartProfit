<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartProfit AI</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:rgba(255,255,255,0.06);
padding:18px;
border-radius:14px;
margin-top:15px;
backdrop-filter: blur(10px);
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
outline:none;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#4f46e5;
color:white;
font-weight:bold;
cursor:pointer;
}

h1{
text-align:center;
}

.sub{
text-align:center;
opacity:0.7;
}

canvas{
background:white;
border-radius:10px;
margin-top:10px;
}

.small{
opacity:0.7;
font-size:13px;
}
</style>
</head>

<body>

<div class="container">

<h1>SmartProfit AI</h1>
<p class="sub">Business analytics SaaS prototype</p>

<!-- STATS -->
<div class="card">
<h3>📊 Usage Analytics</h3>
<div>Всего расчетов: <b id="total">0</b></div>
<div class="small">Счётчик увеличивается при каждом анализе</div>
</div>

<!-- INPUT -->
<div class="card">
<h3>📊 Анализ бизнеса</h3>

<input id="rev" type="number" placeholder="Revenue ($)">
<input id="cost" type="number" placeholder="Costs ($)">

<button onclick="calc()">Run Analysis</button>

<div id="result"></div>
<div id="score"></div>
</div>

<!-- CHART -->
<div class="card">
<h3>📈 Chart</h3>
<canvas id="chart"></canvas>
</div>

</div>

<script>

let chart;

/* 🔢 GLOBAL COUNTER (localStorage) */
let total = localStorage.getItem("total") || 0;
document.getElementById("total").innerText = total;

function calc(){

let r = Number(document.getElementById("rev").value);
let c = Number(document.getElementById("cost").value);

let profit = r - c;
let margin = c > 0 ? (profit / c) * 100 : 0;

/* SCORE */
let score = 50;
if(profit > 0) score += 20;
if(margin > 20) score += 20;
if(profit > 2000) score += 10;

score = Math.min(100, score);

/* UI */
document.getElementById("result").innerHTML =
"💰 Profit: $" + profit.toFixed(2) + "<br>" +
"📊 Margin: " + margin.toFixed(2) + "%";

document.getElementById("score").innerHTML =
"🚀 Startup Score: " + score + "/100";

/* 📊 COUNTER + SAVE */
total++;
localStorage.setItem("total", total);
document.getElementById("total").innerText = total;

/* CHART */
draw(r,c,profit);
}

/* 📈 CHART */
function draw(r,c,p){

let ctx=document.getElementById("chart").getContext("2d");

if(chart) chart.destroy();

chart=new Chart(ctx,{
type:"bar",
data:{
labels:["Revenue","Costs","Profit"],
datasets:[{
data:[r,c,p]
}]
}
});
}

</script>

</body>
</html>
