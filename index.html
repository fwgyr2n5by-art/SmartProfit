<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SmartProfit AI – YC Edition</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family: Inter, Arial;
background:#0a0f1c;
color:white;
display:flex;
justify-content:center;
padding:20px;
}

.container{
width:100%;
max-width:850px;
}

.header{
font-size:28px;
font-weight:bold;
margin-bottom:5px;
}

.sub{
opacity:0.6;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.card{
background:rgba(255,255,255,0.06);
padding:15px;
border-radius:14px;
backdrop-filter: blur(10px);
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
outline:none;
}

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:10px;
background:#4f46e5;
color:white;
font-weight:bold;
cursor:pointer;
}

.big{
font-size:22px;
font-weight:bold;
}

.good{color:#22c55e;}
.bad{color:#ef4444;}
.warn{color:#facc15;}
</style>
</head>

<body>

<div class="container">

<div class="header">SmartProfit AI</div>
<div class="sub">YC-style business intelligence dashboard for founders</div>

<div class="grid">

<div class="card">
<div class="big">Inputs</div>

<input id="revenue" type="number" placeholder="Monthly Revenue ($)">
<input id="costs" type="number" placeholder="Monthly Costs ($)">
<input id="investment" type="number" placeholder="Investment ($)">

<button onclick="run()">Run Analysis</button>
</div>

<div class="card">
<div class="big">Metrics</div>
<div id="metrics">No data yet</div>
</div>

<div class="card">
<div class="big">AI Investor Insight</div>
<div id="ai">Waiting for analysis...</div>
</div>

<div class="card">
<div class="big">Risk Score</div>
<div id="risk">—</div>
</div>

</div>

<div class="card" style="margin-top:15px;">
<canvas id="chart"></canvas>
</div>

</div>

<script>

let chart;

function run(){

let r = Number(document.getElementById("revenue").value);
let c = Number(document.getElementById("costs").value);
let i = Number(document.getElementById("investment").value || 0);

let profit = r - c;
let margin = c > 0 ? (profit / c) * 100 : 0;
let roi = i > 0 ? (profit / i) * 100 : 0;

// risk score (YC-style metric)
let risk = 100;

if(profit < 0) risk -= 40;
if(margin < 20) risk -= 20;
if(roi < 10) risk -= 20;
if(r > c) risk += 10;

risk = Math.max(0, Math.min(100, risk));

// metrics
document.getElementById("metrics").innerHTML =
`💰 Profit: $${profit.toFixed(2)}<br>
📊 Margin: ${margin.toFixed(1)}%<br>
📈 ROI: ${roi.toFixed(1)}%`;

// AI INSIGHT (YC style)
let ai = "";

if(risk > 75){
ai = "🟢 Strong startup metrics. This could scale.";
}
else if(risk > 50){
ai = "🟡 Early-stage viability. Needs optimization.";
}
else{
ai = "🔴 High risk business model. Not VC-ready yet.";
}

document.getElementById("ai").innerHTML = ai;

// risk display
document.getElementById("risk").innerHTML =
`Risk Score: ${risk}/100`;

// chart
draw(r,c,profit);

}

function draw(r,c,p){

let ctx = document.getElementById("chart").getContext("2d");

if(chart) chart.destroy();

chart = new Chart(ctx,{
type:"bar",
data:{
labels:["Revenue","Costs","Profit"],
datasets:[{
data:[r,c,p]
}]
}
});

}

</script>

</body>
</html>
