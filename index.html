<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartProfit AI</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.hero{
    text-align:center;
    margin-bottom:25px;
}

.hero h1{
    font-size:42px;
    margin-bottom:10px;
}

.hero p{
    opacity:.8;
}

.card{
    background:#1e293b;
    border-radius:16px;
    padding:20px;
    margin-bottom:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
}

input{
    width:100%;
    box-sizing:border-box;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
}

button{
    width:100%;
    margin-top:15px;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.metric{
    margin-bottom:10px;
}

#chart{
    background:white;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

    <div class="hero">
        <h1>SmartProfit AI</h1>
        <p>Business Intelligence Dashboard for Founders</p>
    </div>

    <div class="card">
        <h3>Features</h3>
        <p>📊 Financial Analytics</p>
        <p>🧠 AI Business Insights</p>
        <p>📈 Growth Forecasting</p>
        <p>🎯 Startup Health Score</p>
    </div>

    <div class="grid">

        <div class="card">
            <h3>Inputs</h3>

            <input id="revenue" type="number" placeholder="Monthly Revenue ($)">
            <input id="costs" type="number" placeholder="Monthly Costs ($)">
            <input id="investment" type="number" placeholder="Investment ($)">

            <button onclick="analyze()">
                Generate Analysis
            </button>
        </div>

        <div class="card">
            <h3>Metrics</h3>
            <div id="metrics">
                Enter values and click Generate Analysis
            </div>
        </div>

        <div class="card">
            <h3>AI Insight</h3>
            <div id="ai">
                Waiting for data...
            </div>
        </div>

        <div class="card">
            <h3>Startup Health Score</h3>
            <div id="risk">
                —
            </div>
        </div>

    </div>

    <div class="card">
        <canvas id="chart"></canvas>
    </div>

</div>

<script>

let chart = null;

function analyze(){

    const revenue =
        Number(document.getElementById("revenue").value);

    const costs =
        Number(document.getElementById("costs").value);

    const investment =
        Number(document.getElementById("investment").value || 0);

    const profit = revenue - costs;

    const margin =
        costs > 0
        ? (profit / costs) * 100
        : 0;

    const roi =
        investment > 0
        ? (profit / investment) * 100
        : 0;

    const annualProfit = profit * 12;

    let health = 50;

    if(profit > 0) health += 20;
    if(margin > 20) health += 15;
    if(roi > 10) health += 15;

    health = Math.min(100, health);

    document.getElementById("metrics").innerHTML =
        `
        <div class="metric">💰 Profit: $${profit.toFixed(2)}</div>
        <div class="metric">📊 Margin: ${margin.toFixed(2)}%</div>
        <div class="metric">📈 ROI: ${roi.toFixed(2)}%</div>
        <div class="metric">📅 Annual Forecast: $${annualProfit.toFixed(2)}</div>
        `;

    let insight = "";

    if(profit > 0){
        insight =
        "🟢 Business is profitable. Focus on growth and customer acquisition.";
    } else {
        insight =
        "🔴 Business is losing money. Reduce costs or increase revenue.";
    }

    document.getElementById("ai").innerHTML = insight;

    document.getElementById("risk").innerHTML =
        `🚀 Startup Health Score: ${health}/100`;

    drawChart(revenue,costs,profit);
}

function drawChart(revenue,costs,profit){

    const ctx =
        document.getElementById("chart").getContext("2d");

    if(chart){
        chart.destroy();
    }

    chart = new Chart(ctx,{
        type:"bar",
        data:{
            labels:["Revenue","Costs","Profit"],
            datasets:[{
                data:[revenue,costs,profit]
            }]
        },
        options:{
            responsive:true
        }
    });
}

</script>

</body>
</html>
