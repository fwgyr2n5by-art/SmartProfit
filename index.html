<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartProfit AI</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0b1220,#111b33);
color:white;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.header{
text-align:center;
padding:20px 0;
}

.header h1{
margin:0;
font-size:34px;
}

.header p{
opacity:0.7;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

@media(max-width:700px){
.grid{grid-template-columns:1fr;}
}

.card{
background:rgba(255,255,255,0.06);
padding:18px;
border-radius:14px;
backdrop-filter: blur(10px);
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
outline:none;
}

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:10px;
background:#4f46e5;
color:white;
font-weight:bold;
cursor:pointer;
}

.result{
margin-top:15px;
line-height:1.6;
}

canvas{
background:white;
border-radius:10px;
margin-top:10px;
}

.chat-box{
height:200px;
overflow:auto;
background:rgba(0,0,0,0.3);
padding:10px;
border-radius:10px;
margin-bottom:10px;
font-size:14px;
}

.msg{
margin:5px 0;
}

.user{color:#60a5fa;}
.ai{color:#34d399;}

.small{
opacity:0.6;
font-size:12px;
text-align:center;
margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>📊 SmartProfit AI</h1>
<p>Анализ бизнеса и AI-ассистент для стартапов</p>
</div>

<div class="grid">

<!-- КАЛЬКУЛЯТОР -->
<div class="card">
<h3>📈 Анализ бизнеса</h3>

<input id="revenue" type="number" placeholder="Выручка (₽)">
<input id="costs" type="number" placeholder="Расходы (₽)">

<button onclick="calc()">Рассчитать</button>

<div class="result" id="result"></div>
<div class="result" id="score"></div>
</div>

<!-- AI ЧАТ -->
<div class="card">
<h3>🤖 AI ассистент</h3>

<div class="chat-box" id="chat">
<div class="msg ai">AI: Привет! Напиши вопрос про бизнес 👋</div>
</div>

<input id="input" placeholder="Спроси про бизнес...">

<button onclick="askAI()">Отправить</button>

<p class="small">AI пока базовый (без API), но можно подключить настоящий ChatGPT</p>
</div>

</div>

<!-- ГРАФИК -->
<div class="card" style="margin-top:15px;">
<h3>📊 График</h3>
<canvas id="chart"></canvas>
</div>

</div>

<script>

let chart;

/* БИЗНЕС КАЛЬКУЛЯТОР */
function calc(){

let r = Number(document.getElementById("revenue").value);
let c = Number(document.getElementById("costs").value);

if(!r || !c){
alert("Введите значения");
return;
}

let profit = r - c;
let margin = (profit / c) * 100;

let score = 50;
if(profit > 0) score += 20;
if(margin > 20) score += 20;
if(profit > 10000) score += 10;

score = Math.min(100, score);

document.getElementById("result").innerHTML =
`💰 Прибыль: ${profit.toFixed(2)} ₽<br>
📊 Маржа: ${margin.toFixed(2)}%`;

let status =
score > 80 ? "🟢 Сильный бизнес" :
score > 50 ? "🟡 Средний" :
"🔴 Слабый";

document.getElementById("score").innerHTML =
`🚀 Оценка: ${score}/100<br>${status}`;

draw(r,c,profit);
}

/* ГРАФИК */
function draw(r,c,p){

let ctx=document.getElementById("chart").getContext("2d");

if(chart) chart.destroy();

chart=new Chart(ctx,{
type:"bar",
data:{
labels:["Выручка","Расходы","Прибыль"],
datasets:[{data:[r,c,p]}]
}
});
}

/* ПРОСТОЙ AI (без API) */
function askAI(){

let input=document.getElementById("input");
let text=input.value.trim();
if(!text) return;

addMsg("user",text);

/* УМНЫЕ ОТВЕТЫ (заглушка) */
let reply="";

if(text.includes("прибыль")){
reply="Прибыль = выручка - расходы.";
}
else if(text.includes("маржа")){
reply="Маржа = (прибыль / расходы) * 100%";
}
else if(text.includes("бизнес")){
reply="Хороший бизнес = высокая маржа и стабильная прибыль.";
}
else{
reply="Я пока базовый AI. Можно подключить настоящий ChatGPT API.";
}

setTimeout(()=>addMsg("ai",reply),400);

input.value="";
}

function addMsg(type,text){
let chat=document.getElementById("chat");
chat.innerHTML += `<div class="msg ${type}">${type==="user"?"Ты":"AI"}: ${text}</div>`;
chat.scrollTop=chat.scrollHeight;
}

</script>

</body>
</html>
