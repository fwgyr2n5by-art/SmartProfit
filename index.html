<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>SmartProfit AI</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:rgba(255,255,255,0.06);
padding:15px;
border-radius:12px;
margin-top:15px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#4f46e5;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

h1{text-align:center;}
.sub{text-align:center;opacity:0.7;}
</style>
</head>

<body>

<div class="container">

<h1>SmartProfit AI</h1>
<p class="sub">Аналитика бизнеса и прибыльности</p>

<div class="card">
<h3>📊 Ввод данных</h3>

<input id="revenue" type="number" placeholder="Выручка">
<input id="costs" type="number" placeholder="Расходы">

<button onclick="calc()">Рассчитать</button>
</div>

<div class="card">
<h3>📈 Результат</h3>
<div id="result">Введите данные</div>
</div>

<div class="card">
<h3>🧠 AI вывод</h3>
<div id="ai">—</div>
</div>

</div>

<script>
function calc(){

let r = Number(document.getElementById("revenue").value);
let c = Number(document.getElementById("costs").value);

let profit = r - c;
let margin = c > 0 ? (profit / c) * 100 : 0;

document.getElementById("result").innerHTML =
"Прибыль: $" + profit.toFixed(2) + "<br>" +
"Маржа: " + margin.toFixed(2) + "%";

let ai = "";

if(profit > 0){
ai = "Бизнес прибыльный и устойчивый";
} else {
ai = "Бизнес убыточный — нужно оптимизировать расходы";
}

document.getElementById("ai").innerHTML = ai;

}
</script>

</body>
</html>
