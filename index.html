<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartProfit AI</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

h1{
text-align:center;
margin-bottom:5px;
}

.sub{
text-align:center;
opacity:0.7;
margin-bottom:20px;
}

.card{
background:rgba(255,255,255,0.06);
padding:15px;
border-radius:12px;
margin-top:15px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
outline:none;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#4f46e5;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.result{
margin-top:10px;
line-height:1.6;
}

.ai{
margin-top:10px;
opacity:0.9;
}
</style>
</head>

<body>

<div class="container">

<h1>SmartProfit AI</h1>
<p class="sub">Аналитика бизнеса и инвестиционная оценка</p>

<div class="card">
<h3>📊 Ввод данных</h3>

<input id="revenue" type="number" placeholder="Выручка ($)">
<input id="costs" type="number" placeholder="Расходы ($)">

<button onclick="calc()">Рассчитать</button>
</div>

<div class="card">
<h3>📈 Результаты</h3>
<div id="result">Введите данные</div>
</div>

<div class="card">
<h3>🧠 AI анализ</h3>
<div id="ai">Ожидание анализа...</div>
</div>

</div>

<script>
function calc(){

let r = Number(document.getElementById("revenue").value);
let c = Number(document.getElementById("costs").value);

let profit = r - c;
let margin = c > 0 ? (profit / c) * 100 : 0;

// Startup Score
let score = 50;

if(profit > 0) score += 20;
if(margin > 20) score += 20;
if(profit > 1000) score += 10;

score = Math.min(100, score);

// results
document.getElementById("result").innerHTML =
"💰 Прибыль: $" + profit.toFixed(2) + "<br>" +
"📊 Маржа: " + margin.toFixed(2) + "%<br>" +
"🚀 Startup Score: " + score + "/100";

// AI logic
let ai = "";

if(score > 80){
ai = "🟢 Сильный бизнес. Можно масштабировать.";
}
else if(score > 50){
ai = "🟡 Рабочая модель, но есть риски.";
}
else{
ai = "🔴 Высокий риск. Нужно улучшить экономику.";
}

document.getElementById("ai").innerHTML = ai;

}
</script>

</body>
</html>
